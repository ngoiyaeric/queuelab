services:
    # === Managed Redis (Shared State) ===
    - type: kv
      name: shared-redis
      plan: free
      region: virginia

    # === Core Service ===
    - type: web
      name: Core
      runtime: docker
      repo: https://github.com/QueueLab/QCX
      plan: starter
      region: virginia
      dockerContext: .
      dockerfilePath: ./Dockerfile
      autoDeployTrigger: commit
      envVarGroups:
        - name: shared-secrets
      envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: Core-DB
          property: connectionString
      - key: REDIS_URL
        fromKeyValue:
          name: shared-redis
          property: connectionString
      - key: FIX_SERVICE_URL
        fromService:
          name: fluidity-index-benchmark
          property: host
      - key: EVA_SERVICE_URL
        fromService:
          name: eva
          property: host
      healthCheckPath: /health
      previews:
        generation: automatic

    # === Fluidity Index Benchmark (Main App - FIX) ===
    - type: web
      name: fluidity-index-benchmark
      runtime: docker
      repo: https://github.com/QueueLab/FIX
      plan: starter
      region: virginia
      dockerContext: .
      dockerfilePath: ./Dockerfile
      domains:
      - www.benchmark.queue.cx
      - opensaucy.xyz
      - benchmark.queue.cx
      - www.opensaucy.xyz
      autoDeployTrigger: "off"
      envVarGroups:
        - name: shared-secrets
      envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: FIX-DB
          property: connectionString
      - key: REDIS_URL
        fromKeyValue:
          name: shared-redis
          property: connectionString
      - key: CORE_SERVICE_URL
        fromService:
          name: Core
          property: host
      previews:
        generation: automatic
      healthCheckPath: /health
      scaling:
        minInstances: 1
        maxInstances: 3

    # === EVA (Agent Service) ===
    - type: web
      name: eva
      runtime: docker
      repo: https://github.com/QueueLab/EVA
      plan: starter
      region: virginia
      dockerContext: .
      dockerfilePath: ./Dockerfile
      autoDeployTrigger: commit
      envVarGroups:
        - name: shared-secrets
      envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: EVA-DB
          property: connectionString
      - key: REDIS_URL
        fromKeyValue:
          name: shared-redis
          property: connectionString
      - key: CORE_SERVICE_URL
        fromService:
          name: Core
          property: host
      healthCheckPath: /health
      previews:
        generation: automatic

    # === Queuelab (This Repo - Frontend) ===
    - type: web
      name: queuelab
      runtime: docker
      repo: https://github.com/ngoiyaeric/queuelab
      plan: free
      region: virginia
      dockerContext: .
      dockerfilePath: ./Dockerfile
      autoDeployTrigger: commit
      envVarGroups:
        - name: shared-secrets
      envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: Queuelab-DB
          property: connectionString
      - key: REDIS_URL
        fromKeyValue:
          name: shared-redis
          property: connectionString
      - key: FASTAPI_BASE_URL
        fromService:
          name: queuelab-backend
          property: host
      - key: CORE_SERVICE_URL
        fromService:
          name: Core
          property: host
      healthCheckPath: /api/health
      previews:
        generation: automatic

    # === Queuelab (This Repo - Backend) ===
    - type: pserv
      name: queuelab-backend
      runtime: docker
      repo: https://github.com/ngoiyaeric/queuelab
      plan: free
      region: virginia
      dockerContext: ./backend
      dockerfilePath: ./Dockerfile
      autoDeployTrigger: commit
      preDeployCommand: echo "Starting Backend Pre-deployment (Migrations, etc)..."
      envVarGroups:
        - name: shared-secrets
      envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: Queuelab-DB
          property: connectionString
      - key: REDIS_URL
        fromKeyValue:
          name: shared-redis
          property: connectionString
      - key: PORT
        value: 8000
      healthCheckPath: /health

    # === Background/Worker for Inter-function Tasks ===
    - type: worker
      name: background-worker
      runtime: docker
      repo: https://github.com/ngoiyaeric/queuelab
      dockerContext: .
      dockerfilePath: ./Dockerfile.worker
      plan: free
      region: virginia
      envVarGroups:
        - name: shared-secrets
      envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: Queuelab-DB
          property: connectionString
      - key: REDIS_URL
        fromKeyValue:
          name: shared-redis
          property: connectionString

databases:
  - name: FIX-DB
    databaseName: fix_mvfs
    user: fix_mvfs_user
    plan: basic-256mb
    region: virginia
    ipAllowList:
    - source: 0.0.0.0/0
      description: everywhere
    postgresMajorVersion: "18"
    diskSizeGB: 15

  - name: Core-DB
    databaseName: core_db_1snu
    user: core_db_1snu_user
    plan: free
    region: virginia
    ipAllowList:
    - source: 0.0.0.0/0
      description: everywhere
    postgresMajorVersion: "18"

  - name: EVA-DB
    databaseName: eva_db
    user: eva_user
    plan: free
    region: virginia
    ipAllowList:
    - source: 0.0.0.0/0
      description: everywhere
    postgresMajorVersion: "18"

  - name: Queuelab-DB
    databaseName: queuelab_db
    user: queuelab_user
    plan: free
    region: virginia
    ipAllowList:
    - source: 0.0.0.0/0
      description: everywhere
    postgresMajorVersion: "18"

envVarGroups:
  - name: shared-secrets
    envVars:
    - key: CLERK_SECRET_KEY
      sync: false
    - key: OPENROUTER_API_KEY
      sync: false
    - key: STRIPE_SECRET_KEY
      sync: false
    - key: OPENAI_API_KEY
      sync: false
    - key: XAI_API_KEY
      sync: false
    - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
      sync: false
