version: "1"

projects:
- name: queue.cx
  environments:
  - name: Production
    services:
    # === Prototype (Frontend/Prototype Web) ===
    - type: web
      name: Prototype
      runtime: docker
      repo: https://github.com/QueueLab/Prototype
      plan: free
      region: virginia
      dockerContext: .
      dockerfilePath: ./Dockerfile
      autoDeployTrigger: commit
      healthCheckPath: /health
      previews:
        generation: automatic

    # === Core (Backend API - QCX) ===
    - type: web
      name: Core
      runtime: docker
      repo: https://github.com/QueueLab/QCX
      plan: free
      region: virginia
      dockerContext: .
      dockerfilePath: ./Dockerfile
      autoDeployTrigger: commit
      envVars:
      - key: EXECUTE_MIGRATIONS
        sync: false
      - key: EXECUTE_MIGRATIONS_TRIGGER
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: Core-DB
          property: connectionString
      - key: PORT
        sync: false
      - key: FIX_SERVICE_URL
        fromService:
          name: fluidity-index-benchmark
          property: host
      - key: EVA_SERVICE_URL
        fromService:
          name: eva
          property: host
      healthCheckPath: /health
      previews:
        generation: automatic

    # === Fluidity Index Benchmark (Main App - FIX) ===
    - type: web
      name: fluidity-index-benchmark
      runtime: docker
      repo: https://github.com/QueueLab/FIX
      plan: starter
      region: virginia
      dockerContext: .
      dockerfilePath: ./Dockerfile
      domains:
      - www.benchmark.queue.cx
      - opensaucy.xyz
      - benchmark.queue.cx
      - www.opensaucy.xyz
      autoDeployTrigger: "off"
      envVars:
      - key: BASE_API_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: PORT
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: FIX-DB
          property: connectionString
      - key: CORE_SERVICE_URL
        fromService:
          name: Core
          property: host
      previews:
        generation: automatic
      healthCheckPath: /health
      scaling:
        minInstances: 1
        maxInstances: 3

    # === EVA (Agent Service) ===
    - type: web
      name: eva
      runtime: docker
      repo: https://github.com/QueueLab/EVA
      plan: starter
      region: virginia
      dockerContext: .
      dockerfilePath: ./Dockerfile
      autoDeployTrigger: commit
      envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: EVA-DB
          property: connectionString
      - key: CORE_SERVICE_URL
        fromService:
          name: Core
          property: host
      healthCheckPath: /health
      previews:
        generation: automatic

    # === Queuelab (This Repo - Frontend) ===
    - type: web
      name: queuelab
      runtime: docker
      repo: https://github.com/ngoiyaeric/queuelab
      plan: free
      region: virginia
      dockerContext: .
      dockerfilePath: ./Dockerfile
      autoDeployTrigger: commit
      envVars:
      - key: XAI_API_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: PORT
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: Queuelab-DB
          property: connectionString
      - key: FASTAPI_BASE_URL
        fromService:
          name: queuelab-backend
          property: host
      - key: CORE_SERVICE_URL
        fromService:
          name: Core
          property: host
      healthCheckPath: /api/health
      previews:
        generation: automatic

    # === Queuelab (This Repo - Backend) ===
    - type: pserv
      name: queuelab-backend
      runtime: docker
      repo: https://github.com/ngoiyaeric/queuelab
      plan: free
      region: virginia
      dockerContext: ./backend
      dockerfilePath: ./Dockerfile
      autoDeployTrigger: commit
      envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: Queuelab-DB
          property: connectionString
      - key: PORT
        value: 8000
      healthCheckPath: /health

    # === Background/Worker for Inter-function Tasks ===
    - type: worker
      name: background-worker
      runtime: docker
      repo: https://github.com/QueueLab/QCX
      dockerContext: .
      dockerfilePath: ./Dockerfile.worker
      plan: free
      region: virginia
      envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: Core-DB
          property: connectionString
      - key: FIX_DB_URL
        fromDatabase:
          name: FIX-DB
          property: connectionString
      - key: EVA_DB_URL
        fromDatabase:
          name: EVA-DB
          property: connectionString

    databases:
    - name: FIX-DB
      databaseName: fix_mvfs
      user: fix_mvfs_user
      plan: basic-256mb
      region: virginia
      ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere
      postgresMajorVersion: "18"
      diskSizeGB: 15

    - name: Core-DB
      databaseName: core_db_1snu
      user: core_db_1snu_user
      plan: free
      region: virginia
      ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere
      postgresMajorVersion: "18"

    - name: EVA-DB
      databaseName: eva_db
      user: eva_user
      plan: free
      region: virginia
      ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere
      postgresMajorVersion: "18"

    - name: Queuelab-DB
      databaseName: queuelab_db
      user: queuelab_user
      plan: free
      region: virginia
      ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere
      postgresMajorVersion: "18"

envVarGroups:
  - name: shared-secrets
    envVars:
    - key: CLERK_SECRET_KEY
      sync: false
    - key: OPENROUTER_API_KEY
      sync: false
    - key: STRIPE_SECRET_KEY
      sync: false
    - key: OPENAI_API_KEY
      sync: false
    - key: XAI_API_KEY
      sync: false
