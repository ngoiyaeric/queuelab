services:
    # === FIX (Location Intelligence) ===
    - type: web
      name: fix
      runtime: docker
      repo: https://github.com/QueueLab/FIX
      plan: starter
      region: virginia
      dockerContext: .
      dockerfilePath: ./Dockerfile
      autoDeployTrigger: commit
      envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: FIX-DB
          property: connectionString
      - key: CORE_SERVICE_URL
        fromService:
          name: Core
          property: host
      previews:
        generation: automatic
      healthCheckPath: /health
      scaling:
        minInstances: 1
        maxInstances: 3

    # === EVA (Agent Service) ===
    - type: web
      name: eva
      runtime: docker
      repo: https://github.com/QueueLab/EVA
      plan: starter
      region: virginia
      dockerContext: .
      dockerfilePath: ./Dockerfile
      autoDeployTrigger: commit
      envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: EVA-DB
          property: connectionString
      - key: CORE_SERVICE_URL
        fromService:
          name: Core
          property: host
      healthCheckPath: /health
      previews:
        generation: automatic

    # === Queuelab (This Repo - Frontend) ===
    - type: web
      name: queuelab
      runtime: docker
      repo: https://github.com/ngoiyaeric/queuelab
      plan: free
      region: virginia
      dockerContext: .
      dockerfilePath: ./Dockerfile
      autoDeployTrigger: commit
      envVars:
      - fromGroup: shared-secrets
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: Queuelab-DB
          property: connectionString
      - key: FASTAPI_BASE_URL
        fromService:
          name: queuelab-backend
          property: host
      - key: CORE_SERVICE_URL
        fromService:
          name: Core
          property: host
      healthCheckPath: /api/health
      previews:
        generation: automatic

    # === Queuelab (This Repo - Backend) ===
    - type: web # Changed to web so frontend can reach it via public/internal URL if needed
      name: queuelab-backend
      runtime: docker
      repo: https://github.com/ngoiyaeric/queuelab
      plan: free
      region: virginia
      dockerContext: ./backend
      dockerfilePath: ./Dockerfile
      autoDeployTrigger: commit
      envVars:
      - fromGroup: shared-secrets
      - key: DATABASE_URL
        fromDatabase:
          name: Queuelab-DB
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: queuelab-cache
          property: connectionString
      - key: PORT
        value: 8000
      healthCheckPath: /health

    # === Background Worker (Demonstrating Async Microservice) ===
    - type: worker
      name: queuelab-worker
      runtime: docker
      repo: https://github.com/ngoiyaeric/queuelab
      plan: free
      region: virginia
      dockerContext: ./backend
      dockerfilePath: ./Dockerfile
      autoDeployTrigger: commit
      # Override the start command for worker mode
      startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000 # In a real app, this would be a worker process like 'celery'
      envVars:
      - fromGroup: shared-secrets
      - key: DATABASE_URL
        fromDatabase:
          name: Queuelab-DB
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: queuelab-cache
          property: connectionString

    # === Managed Redis for Async Tasks ===
    - type: redis
      name: queuelab-cache
      plan: free
      region: virginia
      ipAllowList: [] # Internal only

databases:
    - name: FIX-DB
      databaseName: fix_mvfs
      user: fix_mvfs_user
      plan: basic-256mb
      region: virginia
      postgresMajorVersion: "18"
      diskSizeGB: 15

    - name: Core-DB
      databaseName: core_db_1snu
      user: core_db_1snu_user
      plan: free
      region: virginia
      postgresMajorVersion: "18"

    - name: EVA-DB
      databaseName: eva_db
      user: eva_user
      plan: free
      region: virginia
      postgresMajorVersion: "18"

    - name: Queuelab-DB
      databaseName: queuelab_db
      user: queuelab_user
      plan: free
      region: virginia
      postgresMajorVersion: "18"

envVarGroups:
  - name: shared-secrets
    envVars:
    - key: CLERK_SECRET_KEY
      sync: false
    - key: OPENROUTER_API_KEY
      sync: false
    - key: STRIPE_SECRET_KEY
      sync: false
    - key: OPENAI_API_KEY
      sync: false
    - key: XAI_API_KEY
      sync: false
